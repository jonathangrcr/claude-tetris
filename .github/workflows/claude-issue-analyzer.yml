name: Claude Issue Analyzer

on:
  issues:
    types: [opened, edited]

jobs:
  analyze-issue:
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyze issue and apply labels
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowed-tools
            Bash(gh label*),
            Bash(gh issue edit*),
            Bash(gh issue comment*)
          prompt: |
            You are an automated issue triage assistant for a browser-based Tetris game repository.
            The repo contains three files only: index.html, style.css, game.js (~305 lines of vanilla JS, no build step).

            ## Issue to analyze
            - Repository: ${{ github.repository }}
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Body:
              ${{ github.event.issue.body }}

            ---

            ## Step 1 — Ensure labels exist (idempotent)

            Run each of these (--force makes them safe to re-run):

            ```
            gh label create "bug"           --color "d73a4a" --description "Something is broken"               --repo ${{ github.repository }} --force
            gh label create "enhancement"   --color "a2eeef" --description "New feature or improvement"        --repo ${{ github.repository }} --force
            gh label create "question"      --color "d876e3" --description "Needs clarification or answer"     --repo ${{ github.repository }} --force
            gh label create "documentation" --color "0075ca" --description "Docs, README, or comments"         --repo ${{ github.repository }} --force
            gh label create "performance"   --color "e4e669" --description "Speed or frame-rate concern"       --repo ${{ github.repository }} --force
            gh label create "visual"        --color "f9a825" --description "Rendering or UI appearance"        --repo ${{ github.repository }} --force
            gh label create "gameplay"      --color "2ea44f" --description "Core game mechanics"               --repo ${{ github.repository }} --force
            gh label create "controls"      --color "6f42c1" --description "Keyboard input or responsiveness"  --repo ${{ github.repository }} --force
            ```

            ## Step 2 — Apply 1–3 labels

            Choose from: bug, enhancement, question, documentation, performance, visual, gameplay, controls

            - bug           → something works incorrectly (collision, scoring, rendering glitch)
            - enhancement   → new feature or improvement suggestion
            - question      → asking how something works or requesting help
            - documentation → relates to README, code comments, or missing docs
            - performance   → frame rate drops, lag, slow animation
            - visual        → color, layout, canvas appearance, CSS
            - gameplay      → piece rotation, line clearing, level progression, scoring rules
            - controls      → keyboard shortcuts, input handling, key repeat

            Apply with:
            ```
            gh issue edit ${{ github.event.issue.number }} --add-label "<label1>,<label2>" --repo ${{ github.repository }}
            ```

            ## Step 3 — Post a diagnostic comment

            Post exactly one Markdown comment:
            ```
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "<markdown>"
            ```

            Use this structure:
            ```markdown
            ## Issue Analysis

            **Type:** <one-sentence classification>

            **Labels applied:** <comma-separated list>

            ### Diagnosis
            <2–4 sentences. Reference specific parts of the codebase (e.g., `lockPiece()` in game.js,
            canvas sizing in index.html, CSS variables in style.css) when relevant.>

            ### Suggested Next Steps
            - <actionable step 1>
            - <actionable step 2>
            - <actionable step 3 if needed>

            ---
            *Automatically triaged by Claude.*
            ```

            Do not post more than one comment. Do not remove existing labels. Do not edit the issue title or body.
